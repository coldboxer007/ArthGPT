<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="ChanakAI — India's AI Money Mentor. Free AI-powered financial planning: FIRE roadmap, portfolio X-ray, tax optimisation." />
    <meta name="theme-color" content="#040A18" />
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💰</text></svg>" />
    <title>ChanakAI — Your Money. Finally Understood.</title>
  </head>
  <body>
    <div id="root"></div>
    <div id="js-error-overlay" style="display:none;position:fixed;inset:0;background:#0a0a0a;color:#ff6b6b;font-family:monospace;font-size:13px;padding:32px;z-index:99999;overflow:auto;white-space:pre-wrap;"></div>
    <script>
      window.addEventListener('error', function(e) {
        var el = document.getElementById('js-error-overlay');
        el.style.display = 'block';
        el.textContent = '⚠ Uncaught JS Error\n\n' + (e.message || '') + '\n\n' + (e.filename || '') + ':' + e.lineno + ':' + e.colno + '\n\n' + (e.error && e.error.stack ? e.error.stack : '');
      });
      window.addEventListener('unhandledrejection', function(e) {
        var el = document.getElementById('js-error-overlay');
        el.style.display = 'block';
        el.textContent += '\n\n⚠ Unhandled Promise Rejection\n\n' + (e.reason && e.reason.stack ? e.reason.stack : String(e.reason));
      });
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
